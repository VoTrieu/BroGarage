services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: brogarage-sql-server
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password@1"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sql-server-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Password@1' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  sql-server-data:
